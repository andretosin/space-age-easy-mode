name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run package.sh
        run: bash scripts/package.sh

      - name: Read new version
        id: version
        run: |
          VERSION=$(python -c "import json; print(json.load(open('info.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          MOD_NAME=$(python -c "import json; print(json.load(open('info.json'))['name'])")
          echo "zip=${MOD_NAME}_${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add info.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: ${{ steps.version.outputs.zip }}
