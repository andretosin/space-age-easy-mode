[mod-name]
space-age-easy-mode=Space Age Mode Facile

[mod-description]
space-age-easy-mode=Réduit le grind et accélère la progression. Toutes les machines de production reçoivent des bonus de base de vitesse, de productivité et d'efficacité. Tous les effets des modules sont doublés. Les robots se déplacent à 2× la vitesse et transportent 2× plus de marchandises. La production d'énergie est doublée (machine/turbine à vapeur, plasma/fusion, solaire, paratonnerres). Les roboports ont un rayon de logistique/construction étendu et une recharge plus rapide.
