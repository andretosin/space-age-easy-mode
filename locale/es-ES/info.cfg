[mod-name]
space-age-easy-mode=Space Age Modo Fácil

[mod-description]
space-age-easy-mode=Reduce el grindeo y acelera la progresión. Todas las máquinas de producción reciben bonificaciones base de velocidad, productividad y eficiencia. Todos los efectos de los módulos se duplican. Los robots se mueven al 2× de velocidad y transportan 2× de carga. La generación de energía se duplica (motor/turbina de vapor, plasma/fusión, solar, pararrayos). Los robopuertos tienen un radio de logística/construcción ampliado y una recarga más rápida.
