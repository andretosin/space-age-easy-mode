[mod-name]
space-age-easy-mode=Space Age Einfacher Modus

[mod-description]
space-age-easy-mode=Reduziert den Grind und beschleunigt den Fortschritt. Alle Produktionsmaschinen erhalten Grundboni auf Geschwindigkeit, Produktivität und Effizienz. Alle Moduleffekte werden verdoppelt. Roboter bewegen sich mit 2× Geschwindigkeit und tragen 2× Fracht. Die Energieerzeugung wird verdoppelt (Dampfmaschine/-turbine, Plasma/Fusion, Solar, Blitzableiter). Roboports haben einen erweiterten Logistik-/Konstruktionsradius und laden schneller.
