[mod-name]
space-age-easy-mode=Space Age Snadný režim

[mod-description]
space-age-easy-mode=Snižuje grind a zrychluje postup. Všechny výrobní stroje získávají základní bonusy k rychlosti, produktivitě a efektivitě. Všechny efekty modulů jsou zdvojnásobeny. Roboti se pohybují 2× rychleji a nesou 2× nákladu. Výroba energie je zdvojnásobena (parní stroj/turbína, plazma/fúze, solární panely, hromosvody). Roboporty mají rozšířený logistický/stavební dosah a rychlejší nabíjení.
