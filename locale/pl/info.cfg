[mod-name]
space-age-easy-mode=Space Age Tryb Łatwy

[mod-description]
space-age-easy-mode=Zmniejsza grind i przyspiesza progresję. Wszystkie maszyny produkcyjne otrzymują bazowe premie do szybkości, produktywności i wydajności. Wszystkie efekty modułów są podwojone. Roboty poruszają się z 2× prędkością i przenoszą 2× ładunku. Produkcja energii jest podwojona (silnik/turbina parowa, plazma/fuzja, panele słoneczne, piorunochrony). Roboporty mają zwiększony zasięg logistyki/budowy i szybsze ładowanie.
