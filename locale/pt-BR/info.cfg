[mod-name]
space-age-easy-mode=Space Age Modo Fácil

[mod-description]
space-age-easy-mode=Reduz o grind e acelera a progressão. Todas as máquinas produtivas recebem bônus base de velocidade, produtividade e eficiência. Todos os efeitos de módulos são dobrados. Robôs se movem com 2× de velocidade e carregam 2× de carga. A geração de energia é dobrada (motor/turbina a vapor, plasma/fusão, solar, para-raios). Roboports têm raio de logística/construção ampliado e carregamento mais rápido.
