[mod-name]
space-age-easy-mode=Space Age Easy Mode

[mod-description]
space-age-easy-mode=Reduces grind and accelerates progression. All productive machines receive base speed, productivity and efficiency bonuses. All module effects are doubled. Drones move at 2× speed and carry 2× cargo. Power generation is doubled (steam engine/turbine, plasma/fusion, solar, lightning rods). Roboports have expanded logistics/construction radius and faster charging.
