[mod-name]
space-age-easy-mode=Space Age Лёгкий режим

[mod-description]
space-age-easy-mode=Снижает рутину и ускоряет прогресс. Все производственные машины получают базовые бонусы к скорости, продуктивности и эффективности. Все эффекты модулей удвоены. Роботы перемещаются со скоростью 2× и переносят 2× груза. Производство энергии удвоено (паровой двигатель/турбина, плазма/синтез, солнечные панели, громоотводы). Робопорты имеют увеличенный радиус логистики/строительства и заряжают быстрее.
