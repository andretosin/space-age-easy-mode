[mod-name]
space-age-easy-mode=Space Age Легкий режим

[mod-description]
space-age-easy-mode=Зменшує рутину та прискорює прогрес. Усі виробничі машини отримують базові бонуси до швидкості, продуктивності та ефективності. Усі ефекти модулів подвоєно. Роботи рухаються зі швидкістю 2× і переносять 2× вантажу. Виробництво енергії подвоєно (парова машина/турбіна, плазма/синтез, сонячні панелі, громовідводи). Робопорти мають збільшений радіус логістики/будівництва та швидше заряджання.
